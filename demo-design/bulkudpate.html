			}

			}
			.nav-link.active {

			}

					onclick="router.navigate('dashboard')"

			<!-- Desktop Menu -->

					<li>

							data-page="dashboard"

							Dashboard
						</button>
					</li>
					<li>
						<button

							class="nav-btn"
							data-page="students"
						>
							Students
						</button>
					</li>
					<li>
						<button
							onclick="router.navigate('bulk-update')"
							class="nav-btn"
							data-page="bulk-update"

							Bulk Update

				</ul>
			</div>

			<!-- Mobile Menu -->
			<div class="flex-none lg:hidden">
				<div class="dropdown dropdown-end">
					<label tabindex="0" class="btn btn-ghost btn-circle">
						<i data-lucide="menu"></i>
					</label>
					<ul
						tabindex="0"
						class="menu menu-sm dropdown-content mt-3 z-[1] p-2 shadow bg-base-100 rounded-box w-52"
					>
						<li><a onclick="router.navigate('dashboard')">Dashboard</a></li>
						<li><a onclick="router.navigate('students')">Students</a></li>
						<li><a onclick="router.navigate('bulk-update')">Bulk Update</a></li>
					</ul>
				</div>
			</div>
		</nav>

		<!-- 2. LAYOUT: MAIN VIEWPORT -->

			id="main-content"
			class="flex-grow p-4 lg:p-8 max-w-7xl mx-auto w-full"
		>
			<!-- Components/Pages will inject here -->
			<div class="flex items-center justify-center h-64">
				<span class="loading loading-spinner loading-lg text-primary"></span>
			</div>
		</main>

		<!-- 3. LAYOUT: FOOTER -->
		<footer
			class="footer footer-center p-10 bg-base-100 text-base-content border-t mt-auto"
		>
			<aside>
				<i
					data-lucide="graduation-cap"
					class="w-10 h-10 text-primary opacity-20"
				></i>
				<p class="font-bold">
					MentorTrack Systems <br />
					<span class="font-normal opacity-70"
						>Empowering mentors since 2024</span

				<p class="text-xs opacity-50">Copyright © 2024 - All rights reserved</p>

		</footer>

			const CONSTANTS = {
				CURRENT_ASSIGNMENT: 8,
				TOTAL_ASSIGNMENTS: 10,
			}

			// --- ROUTER ENGINE ---
			const router = {
				currentPage: 'dashboard',
				searchQuery: '',
				filterStatus: 'all',
				bulkTab: 'assignment', // 'assignment' or 'student'

				navigate: function (page, params = null) {
					const content = document.getElementById('main-content')
					content.classList.add('fade-out')

					setTimeout(() => {
						this.currentPage = page
						this.updateNavUI()

						switch (page) {
							case 'dashboard':
								renderDashboard()
								break
							case 'students':
								renderStudents()
								break
							case 'student-detail':
								renderStudentDetail(params)
								break
							case 'bulk-update':
								renderBulkUpdate()
								break
							default:
								renderDashboard()
						}

						content.classList.remove('fade-out')
						lucide.createIcons()
						window.scrollTo(0, 0)
					}, 150)
				},

				updateNavUI: function () {
					document.querySelectorAll('.nav-btn').forEach((btn) => {
						if (btn.dataset.page === this.currentPage) {
							btn.classList.add('text-primary', 'font-bold')
						} else {
							btn.classList.remove('text-primary', 'font-bold')
						}
					})
				},
			}

			// --- HELPER FUNCTIONS ---
			function getStudentStatus(student) {
				const lastDone = student.assignments.lastIndexOf(true) + 1
				const behindBy = CONSTANTS.CURRENT_ASSIGNMENT - lastDone

				if (behindBy >= 2)
					return { label: 'Failing', color: 'badge-error', behind: behindBy }
				if (behindBy === 1)
					return { label: 'Behind', color: 'badge-warning', behind: behindBy }
				return { label: 'On Track', color: 'badge-success', behind: 0 }
			}

			function handleStudentSearch(e) {
				router.searchQuery = e.target.value.toLowerCase()
				renderStudentsTableBody()
			}

			function handleStatusFilter(e) {
				router.filterStatus = e.target.value
				renderStudentsTableBody()
			}

			// --- BULK UPDATE LOGIC ---
			function processBulkAssignments() {
				const emailsText = document.getElementById('bulk-emails').value
				const assignmentNum = parseInt(
					document.getElementById('assignment-select').value,
				)
				const emails = emailsText
					.split('\n')
					.map((e) => e.trim().toLowerCase())
					.filter((e) => e.length > 0)

				if (emails.length === 0) {
					alert('Please enter at least one email address.')
					return
				}

				let updatedCount = 0
				let unmatched = []

				emails.forEach((email) => {
					const student = students.find((s) => s.email.toLowerCase() === email)
					if (student) {
						student.assignments[assignmentNum - 1] = true
						updatedCount++
					} else {
						unmatched.push(email)
					}
				})

				const resultDiv = document.getElementById('bulk-result')
				resultDiv.innerHTML = `
                <div class="alert alert-success shadow-sm mt-4">
                    <i data-lucide="check-circle" class="w-5 h-5"></i>
                    <div>
                        <h3 class="font-bold">Success!</h3>
                        <div class="text-xs">Updated ${updatedCount} students for Assignment ${assignmentNum}.</div>
                    </div>
                </div>
                ${
									unmatched.length
										? `
                    <div class="alert alert-warning shadow-sm mt-2">
                        <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                        <div>
                            <h3 class="font-bold">Unmatched Emails (${unmatched.length})</h3>
                            <div class="text-[10px] break-all">${unmatched.join(', ')}</div>
                        </div>
                    </div>
                `
										: ''
								}
            `
				lucide.createIcons()
				document.getElementById('bulk-emails').value = ''
			}

			function processBulkStudents() {
				const dataText = document.getElementById('bulk-student-data').value
				// Expected format: Name, Email, Phone, JoinedGroup(true/false)
				const rows = dataText
					.split('\n')
					.map((r) => r.trim())
					.filter((r) => r.length > 0)

				if (rows.length === 0) {
					alert('Please enter student data (Name, Email, Phone, Group).')
					return
				}

				let added = 0
				let updated = 0

				rows.forEach((row) => {
					const [name, email, phone, joined] = row
						.split(',')
						.map((item) => item?.trim())
					if (!email) return

					const existingIndex = students.findIndex(
						(s) => s.email.toLowerCase() === email.toLowerCase(),
					)

					const studentObj = {
						id:
							existingIndex >= 0
								? students[existingIndex].id
								: Date.now().toString() + Math.random(),
						name:
							name ||
							(existingIndex >= 0
								? students[existingIndex].name
								: 'Unknown Student'),
						email: email.toLowerCase(),
						phone:
							phone ||
							(existingIndex >= 0 ? students[existingIndex].phone : ''),
						joinedGroup: joined
							? joined.toLowerCase() === 'true'
							: existingIndex >= 0
								? students[existingIndex].joinedGroup
								: false,
						assignments:
							existingIndex >= 0
								? [...students[existingIndex].assignments]
								: Array(10).fill(false),
						callLogs:
							existingIndex >= 0 ? [...students[existingIndex].callLogs] : [],
						lastCall:
							existingIndex >= 0 ? students[existingIndex].lastCall : null,
					}

					if (existingIndex >= 0) {
						students[existingIndex] = studentObj
						updated++
					} else {
						students.push(studentObj)
						added++
					}
				})

				const resultDiv = document.getElementById('bulk-result')
				resultDiv.innerHTML = `
                <div class="alert alert-info shadow-sm mt-4">
                    <i data-lucide="info" class="w-5 h-5"></i>
                    <div>
                        <h3 class="font-bold">Import Complete</h3>
                        <div class="text-xs">Added ${added} new students. Updated ${updated} existing records.</div>
                    </div>
                </div>
            `
				lucide.createIcons()
				document.getElementById('bulk-student-data').value = ''
			}

			// --- PAGE RENDERERS ---

                                <div class="stat-title">Need Calls</div>
                                <div class="stat-value text-warning">${callQueue.length}</div>
                                <div class="stat-desc">Missing Assignment ${CONSTANTS.CURRENT_ASSIGNMENT}</div>

                                <div class="stat-figure text-success"><i data-lucide="check-circle" class="w-8 h-8"></i></div>
                                <div class="stat-title">Cohort Progress</div>
                                <div class="stat-value text-success">${Math.round((distribution.reduce((a, b) => a + b, 0) / (totalStudents * 10)) * 100)}%</div>
                                <div class="stat-desc">Avg. completion rate</div>
                            </div>

                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 space-y-8">
                            <div class="card bg-base-100 shadow">
                                <div class="card-body">
                                    <h2 class="card-title text-sm opacity-60 uppercase tracking-widest mb-4">Submission Distribution</h2>
                                    <div class="flex items-end justify-between gap-1 h-32 px-2">
                                        ${distribution
																					.map(
																						(count, i) => `
                                            <div class="flex flex-col items-center flex-1 group">
                                                <div class="w-full bg-primary/10 rounded-t-sm relative flex items-end justify-center transition-all group-hover:bg-primary/20" style="height: ${(count / totalStudents) * 100}%">

                                        `,
																					)
																					.join('')}
                                    </div>
                                </div>
                            </div>

                            <div class="card bg-base-100 shadow overflow-hidden">
                                <div class="p-4 border-b bg-base-50/50 flex justify-between items-center">
                                    <h2 class="font-bold flex items-center gap-2">
                                        <i data-lucide="user-minus" class="w-4 h-4 text-error"></i>
                                        Students at Risk (Failing)
                                    </h2>
                                    <span class="badge badge-sm badge-error">${failingStudents.length} Students</span>
                                </div>
                                <div class="overflow-x-auto">
                                    <table class="table table-zebra w-full">
                                        <thead>
                                            <tr class="text-xs uppercase opacity-50">
                                                <th>Student</th>
                                                <th>Last Submitted</th>
                                                <th>Status</th>
                                                <th class="text-right">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${
																							failingStudents.length
																								? failingStudents
																										.map(
																											(s) => `
                                                <tr>
                                                    <td>
                                                        <div class="font-bold">${s.name}</div>
                                                        <div class="text-xs opacity-50">${s.email}</div>
                                                    </td>
                                                    <td>Assignment ${s.assignments.lastIndexOf(true) + 1}</td>
                                                    <td><span class="badge badge-error badge-outline badge-sm">Behind by ${getStudentStatus(s).behind}</span></td>
                                                    <td class="text-right">
                                                        <button class="btn btn-ghost btn-xs text-primary" onclick="router.navigate('student-detail', '${s.id}')">Profile</button>
                                                    </td>
                                                </tr>
                                            `,
																										)
																										.join('')
																								: '<tr><td colspan="4" class="text-center py-8 opacity-50 italic">No students are currently failing.</td></tr>'
																						}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="card bg-base-100 shadow h-full">
                                <div class="card-body p-0">
                                    <div class="p-6 border-b">
                                        <h2 class="card-title text-warning flex items-center gap-2">
                                            <i data-lucide="phone" class="w-5 h-5"></i>
                                            Call Queue
                                        </h2>
                                        <p class="text-xs opacity-60 mt-1">Students who missed Assignment ${CONSTANTS.CURRENT_ASSIGNMENT}.</p>
                                    </div>
                                    <div class="p-2 max-h-[600px] overflow-y-auto custom-scrollbar">
                                        ${
																					callQueue.length
																						? callQueue
																								.map(
																									(s) => `
                                            <div class="flex items-center justify-between p-3 hover:bg-base-200 rounded-lg cursor-pointer transition-colors group" onclick="router.navigate('student-detail', '${s.id}')">
                                                <div class="flex flex-col">
                                                    <span class="text-sm font-bold">${s.name}</span>
                                                    <span class="text-xs opacity-60">${s.phone}</span>
                                                </div>
                                                <button class="btn btn-circle btn-ghost btn-xs opacity-0 group-hover:opacity-100">
                                                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                                                </button>

																								)
																								.join('')
																						: '<div class="p-8 text-center text-sm opacity-40 italic">Queue is empty!</div>'
																				}
                                    </div>
                                    <div class="p-4 mt-auto border-t bg-base-50/50">
                                        <button class="btn btn-outline btn-block btn-sm" onclick="alert('Opening call interface...')">Process Queue</button>
                                    </div>
                                </div>
                            </div>

            `
			}

			function renderStudents() {

                        <div class="p-4 border-b bg-base-50/30 flex flex-col md:flex-row gap-4 justify-between">
                            <div class="relative w-full md:max-w-md">
                                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 opacity-40"></i>
                                <input type="text" placeholder="Search by name or email..." class="input input-bordered w-full pl-10" id="student-search-input" oninput="handleStudentSearch(event)">
                            </div>
                            <div class="flex gap-2">
                                <select class="select select-bordered w-full md:w-auto" id="status-filter-select" onchange="handleStatusFilter(event)">
                                    <option value="all">All Statuses</option>
                                    <option value="On Track">On Track</option>
                                    <option value="Behind">Behind (1)</option>
                                    <option value="Failing">Failing (2+)</option>
                                </select>
                                <button class="btn btn-square btn-ghost" onclick="renderStudentsTableBody()">
                                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="table table-zebra w-full">
                                <thead>
                                    <tr class="text-xs uppercase opacity-50">
                                        <th>Student</th>
                                        <th>Progress</th>
                                        <th>Status</th>
                                        <th>Group</th>

                                </thead>

                        </div>
                        <div class="p-4 border-t flex items-center justify-between bg-base-50/30">
                            <span class="text-xs opacity-50" id="table-count-label">Showing 0 students</span>
                            <div class="join">
                                <button class="join-item btn btn-sm btn-disabled">«</button>
                                <button class="join-item btn btn-sm btn-active">1</button>
                                <button class="join-item btn btn-sm">2</button>
                                <button class="join-item btn btn-sm">»</button>
                            </div>
                        </div>
                    </div>
                </div>
            `
				renderStudentsTableBody()
				lucide.createIcons()
			}

			function renderStudentsTableBody() {
				const tableBody = document.getElementById('student-table-body')
				if (!tableBody) return
				const filtered = students.filter((s) => {
					const matchesSearch =
						s.name.toLowerCase().includes(router.searchQuery) ||
						s.email.toLowerCase().includes(router.searchQuery)
					const status = getStudentStatus(s).label
					const matchesStatus =
						router.filterStatus === 'all' || status === router.filterStatus
					return matchesSearch && matchesStatus
				})
				document.getElementById('table-count-label').innerText =
					`Showing ${filtered.length} of ${students.length} students`
				tableBody.innerHTML = filtered.length
					? filtered
							.map((s) => {
								const statusInfo = getStudentStatus(s)
								const completed = s.assignments.filter((a) => a).length
								return `
                    <tr class="group hover:bg-base-100/50">
                        <td>
                            <div class="flex items-center gap-3">
                                <div class="avatar placeholder">
                                    <div class="bg-neutral text-neutral-content rounded-full w-8">
                                        <span class="text-xs">${s.name
																					.split(' ')
																					.map((n) => n[0])
																					.join('')}</span>
                                    </div>
                                </div>
                                <div>
                                    <div class="font-bold text-sm">${s.name}</div>
                                    <div class="text-[10px] opacity-40 uppercase font-semibold tracking-wider">${s.email}</div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="flex flex-col gap-1 w-32">
                                <div class="flex justify-between text-[10px] font-bold">
                                    <span>${completed}/10</span>
                                    <span>${completed * 10}%</span>
                                </div>
                                <progress class="progress progress-primary w-full h-1.5" value="${completed}" max="10"></progress>
                            </div>
                        </td>
                        <td><span class="badge ${statusInfo.color} badge-sm font-bold badge-outline">${statusInfo.label}</span></td>
                        <td>${s.joinedGroup ? '<div class="badge badge-ghost badge-sm text-success gap-1 font-bold">In Group</div>' : '<div class="badge badge-ghost badge-sm text-error gap-1 font-bold">Missing</div>'}</td>
                        <td><div class="text-xs">${s.lastCall || '<span class="opacity-30">No calls yet</span>'}</div></td>
                        <td class="text-right">
                            <button class="btn btn-ghost btn-sm btn-square" onclick="router.navigate('student-detail', '${s.id}')">
                                <i data-lucide="eye" class="w-4 h-4"></i>
                            </button>
                        </td>
                    </tr>
                `
							})
							.join('')
					: '<tr><td colspan="6" class="text-center py-12 italic opacity-50">No students found.</td></tr>'
				lucide.createIcons()
			}

			function renderBulkUpdate() {
				document.getElementById('main-content').innerHTML = `
                <div class="animate-in fade-in duration-500">
                    <div class="mb-8">
                        <h1 class="text-3xl font-bold tracking-tight">Bulk Updates</h1>
                        <p class="text-base-content/60">Update multiple student records or assignments via batch data entry.</p>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <!-- Sidebar: Instructions -->
                        <div class="space-y-6">
                            <div class="card bg-base-100 shadow">
                                <div class="card-body">
                                    <h2 class="card-title text-sm opacity-60 uppercase tracking-widest">Help Center</h2>
                                    <div class="space-y-4 mt-4">
                                        <div class="flex gap-4">
                                            <div class="btn btn-circle btn-primary btn-xs">1</div>
                                            <p class="text-xs">Copy a list of emails from your Google Sheet or database.</p>
                                        </div>
                                        <div class="flex gap-4">
                                            <div class="btn btn-circle btn-primary btn-xs">2</div>
                                            <p class="text-xs">Select the target assignment or field to update.</p>
                                        </div>
                                        <div class="flex gap-4">
                                            <div class="btn btn-circle btn-primary btn-xs">3</div>
                                            <p class="text-xs">Review the confirmation report after clicking "Process".</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Main Content: Tabs & Forms -->
                        <div class="lg:col-span-2">
                            <div class="tabs tabs-lifted mb-0">
                                <button class="tab tab-lg ${router.bulkTab === 'assignment' ? 'tab-active' : ''}" onclick="router.bulkTab = 'assignment'; renderBulkUpdate()">Assignment Update</button>
                                <button class="tab tab-lg ${router.bulkTab === 'student' ? 'tab-active' : ''}" onclick="router.bulkTab = 'student'; renderBulkUpdate()">Student Upsert</button>
                            </div>

                            <div class="card bg-base-100 shadow-xl border-t-0 rounded-tl-none">
                                <div class="card-body">
                                    ${
																			router.bulkTab === 'assignment'
																				? `
                                        <!-- Assignment Bulk UI -->
                                        <div>
                                            <div class="form-control mb-4">
                                                <label class="label"><span class="label-text font-bold">Select Assignment</span></label>
                                                <select class="select select-bordered" id="assignment-select">
                                                    ${Array(10)
																											.fill(0)
																											.map(
																												(_, i) =>
																													`<option value="${i + 1}" ${i + 1 === CONSTANTS.CURRENT_ASSIGNMENT ? 'selected' : ''}>Assignment ${i + 1}</option>`,
																											)
																											.join('')}
                                                </select>
                                            </div>
                                            <div class="form-control">
                                                <label class="label">
                                                    <span class="label-text font-bold">Email List</span>
                                                    <span class="label-text-alt opacity-50">One email per line</span>
                                                </label>
                                                <textarea id="bulk-emails" class="textarea textarea-bordered h-48 font-mono text-xs" placeholder="student1@example.com\nstudent2@example.com"></textarea>
                                            </div>
                                            <div class="card-actions justify-end mt-6">
                                                <button class="btn btn-primary" onclick="processBulkAssignments()">
                                                    <i data-lucide="zap" class="w-4 h-4"></i>
                                                    Process Assignment Bulk
                                                </button>
                                            </div>
                                        </div>
                                    `
																				: `
                                        <!-- Student Bulk UI -->
                                        <div>
                                            <div class="alert alert-info py-2 text-xs mb-4">
                                                <i data-lucide="info" class="w-4 h-4"></i>
                                                Format: <strong>Name, Email, Phone, JoinedGroup(true/false)</strong>
                                            </div>
                                            <div class="form-control">
                                                <label class="label">
                                                    <span class="label-text font-bold">Student Records</span>
                                                    <span class="label-text-alt opacity-50 font-mono italic">CSV Format</span>
                                                </label>
                                                <textarea id="bulk-student-data" class="textarea textarea-bordered h-48 font-mono text-xs" placeholder="John Doe, john@example.com, +123, true\nJane Smith, jane@example.com, +456, false"></textarea>
                                            </div>
                                            <div class="card-actions justify-end mt-6">
                                                <button class="btn btn-secondary" onclick="processBulkStudents()">
                                                    <i data-lucide="user-plus" class="w-4 h-4"></i>
                                                    Process Student Upsert
                                                </button>
                                            </div>
                                        </div>
                                    `
																		}
                                    <div id="bulk-result"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `
				lucide.createIcons()
			}

			function renderStudentDetail(id) {
				document.getElementById('main-content').innerHTML =
					`<h1 class="text-3xl font-bold">Detail for ${id}</h1>`
			}

			// --- INITIALIZATION ---
			window.onload = () => {
				router.navigate('dashboard')
				lucide.createIcons()
			}
		</script>
	</body>
</html>
