<!doctype html>
<html lang="en" data-theme="light">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>MentorTrack — Student Management</title>
		<!-- Dependencies -->
		<script src="https://cdn.tailwindcss.com"></script>
		<link
			href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
			rel="stylesheet"
			type="text/css"
		/>
		<script src="https://unpkg.com/lucide@latest"></script>
		<style>
			/* Fade transition for page switching */
			#main-content {
				transition: opacity 0.2s ease-in-out;
			}
			.fade-out {
				opacity: 0;
			}
			.nav-link.active {
				@apply text-primary font-bold;
			}
		</style>
	</head>
	<body class="bg-base-200 min-h-screen flex flex-col">
		<!-- 1. LAYOUT: NAVBAR -->
		<nav class="navbar bg-base-100 shadow-sm sticky top-0 z-50 px-4 lg:px-8">
			<div class="flex-1">
				<button
					class="btn btn-ghost text-xl gap-2 normal-case"
					onclick="router.navigate('dashboard')"
				>
					<i data-lucide="graduation-cap" class="text-primary"></i>
					<span class="font-bold tracking-tight">MentorTrack</span>
				</button>
			</div>

			<!-- Desktop Menu -->
			<div class="flex-none hidden lg:flex">
				<ul class="menu menu-horizontal px-1 gap-2 font-medium">
					<li>
						<button
							onclick="router.navigate('dashboard')"
							class="nav-btn"
							data-page="dashboard"
						>
							Dashboard
						</button>
					</li>
					<li>
						<button
							onclick="router.navigate('students')"
							class="nav-btn"
							data-page="students"
						>
							Students
						</button>
					</li>
					<li>
						<button
							onclick="router.navigate('bulk-update')"
							class="nav-btn"
							data-page="bulk-update"
						>
							Bulk Update
						</button>
					</li>
				</ul>
			</div>

			<!-- Mobile Menu -->
			<div class="flex-none lg:hidden">
				<div class="dropdown dropdown-end">
					<label tabindex="0" class="btn btn-ghost btn-circle">
						<i data-lucide="menu"></i>
					</label>
					<ul
						tabindex="0"
						class="menu menu-sm dropdown-content mt-3 z-[1] p-2 shadow bg-base-100 rounded-box w-52"
					>
						<li><a onclick="router.navigate('dashboard')">Dashboard</a></li>
						<li><a onclick="router.navigate('students')">Students</a></li>
						<li><a onclick="school.navigate('bulk-update')">Bulk Update</a></li>
					</ul>
				</div>
			</div>
		</nav>

		<!-- 2. LAYOUT: MAIN VIEWPORT -->
		<main
			id="main-content"
			class="flex-grow p-4 lg:p-8 max-w-7xl mx-auto w-full"
		>
			<!-- Components/Pages will inject here -->
			<div class="flex items-center justify-center h-64">
				<span class="loading loading-spinner loading-lg text-primary"></span>
			</div>
		</main>

		<!-- 3. LAYOUT: FOOTER -->
		<footer
			class="footer footer-center p-10 bg-base-100 text-base-content border-t mt-auto"
		>
			<aside>
				<i
					data-lucide="graduation-cap"
					class="w-10 h-10 text-primary opacity-20"
				></i>
				<p class="font-bold">
					MentorTrack Systems <br />
					<span class="font-normal opacity-70"
						>Empowering mentors since 2024</span
					>
				</p>
				<p class="text-xs opacity-50">Copyright © 2024 - All rights reserved</p>
			</aside>
		</footer>

				{

					],

						{

							problem: 'Health issues',
							promise: 'Back in May',
							deadline: '2024-05-01',
							nextFollowUp: '2024-04-27',
						},
					],
					lastCall: '2024-04-20',
				},
			]

			const CONSTANTS = {
				CURRENT_ASSIGNMENT: 8,
				TOTAL_ASSIGNMENTS: 10,
			}

			// --- ROUTER ENGINE ---
			const router = {
				currentPage: 'dashboard',

				navigate: function (page, params = null) {
					const content = document.getElementById('main-content')
					content.classList.add('fade-out')

					setTimeout(() => {
						this.currentPage = page
						this.updateNavUI()

						switch (page) {
							case 'dashboard':
								renderDashboard()
								break
							case 'students':
								renderStudents()
								break
							case 'student-detail':
								renderStudentDetail(params)
								break
							case 'bulk-update':
								renderBulkUpdate()
								break
							default:
								renderDashboard()
						}

						content.classList.remove('fade-out')
						lucide.createIcons()
						window.scrollTo(0, 0)
					}, 150)
				},

				updateNavUI: function () {
					document.querySelectorAll('.nav-btn').forEach((btn) => {
						if (btn.dataset.page === this.currentPage) {
							btn.classList.add('text-primary', 'font-bold')
						} else {
							btn.classList.remove('text-primary', 'font-bold')
						}
					})
				},
			}

			// --- PAGE RENDERERS (To be expanded in next steps) ---
			function renderDashboard() {
				document.getElementById('main-content').innerHTML = `
                <div class="animate-in fade-in duration-500">
                    <h1 class="text-3xl font-bold mb-2">Cohort Dashboard</h1>
                    <p class="opacity-70 mb-8">System layout initialized. Ready to load components.</p>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="card bg-base-100 shadow p-6">
                            <h3 class="font-bold opacity-50">Total Students</h3>
                            <p class="text-4xl font-black">${students.length}</p>
                        </div>
                    </div>
                </div>
            `
			}

			function renderStudents() {
				document.getElementById('main-content').innerHTML =
					`<h1 class="text-3xl font-bold">Student Roster</h1>`
			}

			function renderBulkUpdate() {
				document.getElementById('main-content').innerHTML =
					`<h1 class="text-3xl font-bold">Bulk Update</h1>`
			}

			function renderStudentDetail(id) {
				document.getElementById('main-content').innerHTML =
					`<h1 class="text-3xl font-bold">Detail for ${id}</h1>`
			}

			// --- INITIALIZATION ---
			window.onload = () => {
				router.navigate('dashboard')
				lucide.createIcons()
			}
		</script>
	</body>
</html>
