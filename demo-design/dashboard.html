<!doctype html>
<html lang="en" data-theme="light">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>MentorTrack — Student Management</title>
		<!-- Dependencies -->
		<script src="https://cdn.tailwindcss.com"></script>
		<link
			href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
			rel="stylesheet"
			type="text/css"
		/>
		<script src="https://unpkg.com/lucide@latest"></script>
		<style>
			/* Fade transition for page switching */
			#main-content {
				transition: opacity 0.2s ease-in-out;
			}
			.fade-out {
				opacity: 0;
			}
			.nav-link.active {
				@apply text-primary font-bold;
			}

			/* Custom scrollbar for small lists */
			.custom-scrollbar::-webkit-scrollbar {
				width: 4px;
			}
			.custom-scrollbar::-webkit-scrollbar-track {
				background: transparent;
			}
			.custom-scrollbar::-webkit-scrollbar-thumb {
				background: #cbd5e1;
				border-radius: 10px;
			}
		</style>
	</head>
	<body class="bg-base-200 min-h-screen flex flex-col">
		<!-- 1. LAYOUT: NAVBAR -->
		<nav class="navbar bg-base-100 shadow-sm sticky top-0 z-50 px-4 lg:px-8">
			<div class="flex-1">
				<button
					class="btn btn-ghost text-xl gap-2 normal-case"
					onclick="router.navigate('dashboard')"
				>
					<i data-lucide="graduation-cap" class="text-primary"></i>
					<span class="font-bold tracking-tight">MentorTrack</span>
				</button>
			</div>

			<!-- Desktop Menu -->
			<div class="flex-none hidden lg:flex">
				<ul class="menu menu-horizontal px-1 gap-2 font-medium">
					<li>
						<button
							onclick="router.navigate('dashboard')"
							class="nav-btn"
							data-page="dashboard"
						>
							Dashboard
						</button>
					</li>
					<li>
						<button
							onclick="router.navigate('students')"
							class="nav-btn"
							data-page="students"
						>
							Students
						</button>
					</li>
					<li>
						<button
							onclick="router.navigate('bulk-update')"
							class="nav-btn"
							data-page="bulk-update"
						>
							Bulk Update
						</button>
					</li>
				</ul>
			</div>

			<!-- Mobile Menu -->
			<div class="flex-none lg:hidden">
				<div class="dropdown dropdown-end">
					<label tabindex="0" class="btn btn-ghost btn-circle">
						<i data-lucide="menu"></i>
					</label>
					<ul
						tabindex="0"
						class="menu menu-sm dropdown-content mt-3 z-[1] p-2 shadow bg-base-100 rounded-box w-52"
					>
						<li><a onclick="router.navigate('dashboard')">Dashboard</a></li>
						<li><a onclick="router.navigate('students')">Students</a></li>
						<li><a onclick="router.navigate('bulk-update')">Bulk Update</a></li>
					</ul>
				</div>
			</div>
		</nav>

		<!-- 2. LAYOUT: MAIN VIEWPORT -->
		<main
			id="main-content"
			class="flex-grow p-4 lg:p-8 max-w-7xl mx-auto w-full"
		>
			<!-- Components/Pages will inject here -->
			<div class="flex items-center justify-center h-64">
				<span class="loading loading-spinner loading-lg text-primary"></span>
			</div>
		</main>

		<!-- 3. LAYOUT: FOOTER -->
		<footer
			class="footer footer-center p-10 bg-base-100 text-base-content border-t mt-auto"
		>
			<aside>
				<i
					data-lucide="graduation-cap"
					class="w-10 h-10 text-primary opacity-20"
				></i>
				<p class="font-bold">
					MentorTrack Systems <br />
					<span class="font-normal opacity-70"
						>Empowering mentors since 2024</span
					>
				</p>
				<p class="text-xs opacity-50">Copyright © 2024 - All rights reserved</p>
			</aside>
		</footer>

		<!-- Templates & Logic -->
		<script>
			// --- DATA STATE (SIMULATED DATABASE) ---
			let students = [
				{
					id: '1',
					name: 'John Doe',
					email: 'john@example.com',
					phone: '+1 234 567 890',
					joinedGroup: true,
					assignments: [
						true,
						true,
						true,
						true,
						true,
						false,
						false,
						false,
						false,
						false,
					],
					callLogs: [
						{
							date: '2024-05-01',
							problem: 'Work schedule',
							promise: 'Catch up by Sunday',
							deadline: '2024-05-05',
							nextFollowUp: '2024-05-08',
						},
					],
					lastCall: '2024-05-01',
				},
				{
					id: '2',
					name: 'Jane Smith',
					email: 'jane@example.com',
					phone: '+1 987 654 321',
					joinedGroup: true,
					assignments: [
						true,
						true,
						true,
						true,
						true,
						true,
						true,
						true,
						false,
						false,
					],
					callLogs: [],
					lastCall: null,
				},
				{
					id: '3',
					name: 'Robert Brown',
					email: 'robert@example.com',
					phone: '+1 555 444 333',
					joinedGroup: false,
					assignments: [
						true,
						true,
						false,
						false,
						false,
						false,
						false,
						false,
						false,
						false,
					],
					callLogs: [
						{
							date: '2024-04-20',
							problem: 'Health issues',
							promise: 'Back in May',
							deadline: '2024-05-01',
							nextFollowUp: '2024-04-27',
						},
					],
					lastCall: '2024-04-20',
				},
				{
					id: '4',
					name: 'Alice Wilson',
					email: 'alice@example.com',
					phone: '+1 555 123 456',
					joinedGroup: true,
					assignments: [
						true,
						true,
						true,
						true,
						false,
						false,
						false,
						false,
						false,
						false,
					],
					callLogs: [],
					lastCall: null,
				},
				{
					id: '5',
					name: 'Charlie Davis',
					email: 'charlie@example.com',
					phone: '+1 555 999 888',
					joinedGroup: true,
					assignments: [
						true,
						true,
						true,
						true,
						true,
						true,
						true,
						false,
						false,
						false,
					],
					callLogs: [],
					lastCall: null,
				},
			]

			const CONSTANTS = {
				CURRENT_ASSIGNMENT: 8,
				TOTAL_ASSIGNMENTS: 10,
			}

			// --- ROUTER ENGINE ---
			const router = {
				currentPage: 'dashboard',

				navigate: function (page, params = null) {
					const content = document.getElementById('main-content')
					content.classList.add('fade-out')

					setTimeout(() => {
						this.currentPage = page
						this.updateNavUI()

						switch (page) {
							case 'dashboard':
								renderDashboard()
								break
							case 'students':
								renderStudents()
								break
							case 'student-detail':
								renderStudentDetail(params)
								break
							case 'bulk-update':
								renderBulkUpdate()
								break
							default:
								renderDashboard()
						}

						content.classList.remove('fade-out')
						lucide.createIcons()
						window.scrollTo(0, 0)
					}, 150)
				},

				updateNavUI: function () {
					document.querySelectorAll('.nav-btn').forEach((btn) => {
						if (btn.dataset.page === this.currentPage) {
							btn.classList.add('text-primary', 'font-bold')
						} else {
							btn.classList.remove('text-primary', 'font-bold')
						}
					})
				},
			}

			// --- HELPER FUNCTIONS ---
			function getStudentStatus(student) {
				const completedCount = student.assignments.filter((a) => a).length
				const lastDone = student.assignments.lastIndexOf(true) + 1
				const behindBy = CONSTANTS.CURRENT_ASSIGNMENT - lastDone

				if (behindBy >= 2)
					return { label: 'Failing', color: 'badge-error', behind: behindBy }
				if (behindBy === 1)
					return { label: 'Behind', color: 'badge-warning', behind: behindBy }
				return { label: 'On Track', color: 'badge-success', behind: 0 }
			}

			// --- PAGE RENDERERS ---
			function renderDashboard() {
				// Calculate Stats
				const totalStudents = students.length
				const failingStudents = students.filter(
					(s) => getStudentStatus(s).label === 'Failing',
				)
				const callQueue = students.filter(
					(s) => !s.assignments[CONSTANTS.CURRENT_ASSIGNMENT - 1],
				)

				// Assignment Distribution (Counts per assignment 1-10)
				const distribution = Array(CONSTANTS.TOTAL_ASSIGNMENTS)
					.fill(0)
					.map((_, i) => {
						return students.filter((s) => s.assignments[i]).length
					})

				document.getElementById('main-content').innerHTML = `
                <div class="animate-in fade-in duration-500">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                        <div>
                            <h1 class="text-3xl font-bold tracking-tight text-base-content">Cohort Health</h1>
                            <p class="text-base-content/60">Overview of student progress and engagement.</p>
                        </div>
                        <button class="btn btn-primary" onclick="alert('Exporting Call List CSV...')">
                            <i data-lucide="download" class="w-4 h-4"></i>
                            Export Call List
                        </button>
                    </div>

                    <!-- Stats Cards -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        <div class="stats shadow bg-base-100">
                            <div class="stat">
                                <div class="stat-figure text-primary"><i data-lucide="users" class="w-8 h-8"></i></div>
                                <div class="stat-title">Total Students</div>
                                <div class="stat-value text-primary">${totalStudents}</div>
                                <div class="stat-desc">Active in cohort</div>
                            </div>
                        </div>
                        <div class="stats shadow bg-base-100">
                            <div class="stat">
                                <div class="stat-figure text-error"><i data-lucide="alert-circle" class="w-8 h-8"></i></div>
                                <div class="stat-title">Failing</div>
                                <div class="stat-value text-error">${failingStudents.length}</div>
                                <div class="stat-desc">Behind by 2+ assignments</div>
                            </div>
                        </div>
                        <div class="stats shadow bg-base-100">
                            <div class="stat">
                                <div class="stat-figure text-warning"><i data-lucide="phone-call" class="w-8 h-8"></i></div>
                                <div class="stat-title">Need Calls</div>
                                <div class="stat-value text-warning">${callQueue.length}</div>
                                <div class="stat-desc">Missing Assignment ${CONSTANTS.CURRENT_ASSIGNMENT}</div>
                            </div>
                        </div>
                        <div class="stats shadow bg-base-100">
                            <div class="stat">
                                <div class="stat-figure text-success"><i data-lucide="check-circle" class="w-8 h-8"></i></div>
                                <div class="stat-title">Cohort Progress</div>
                                <div class="stat-value text-success">${Math.round((distribution.reduce((a, b) => a + b, 0) / (totalStudents * 10)) * 100)}%</div>
                                <div class="stat-desc">Avg. completion rate</div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <!-- Column 1 & 2: Main Tables -->
                        <div class="lg:col-span-2 space-y-8">

                            <!-- Distribution Chart (Simplified Visual) -->
                            <div class="card bg-base-100 shadow">
                                <div class="card-body">
                                    <h2 class="card-title text-sm opacity-60 uppercase tracking-widest mb-4">Submission Distribution</h2>
                                    <div class="flex items-end justify-between gap-1 h-32 px-2">
                                        ${distribution
																					.map(
																						(count, i) => `
                                            <div class="flex flex-col items-center flex-1 group">
                                                <div class="w-full bg-primary/10 rounded-t-sm relative flex items-end justify-center transition-all group-hover:bg-primary/20" style="height: ${(count / totalStudents) * 100}%">
                                                    <span class="absolute -top-6 text-[10px] font-bold opacity-0 group-hover:opacity-100">${count}</span>
                                                </div>
                                                <span class="text-[10px] mt-2 opacity-50">A${i + 1}</span>
                                            </div>
                                        `,
																					)
																					.join('')}
                                    </div>
                                </div>
                            </div>

                            <!-- Failing Students Table -->
                            <div class="card bg-base-100 shadow overflow-hidden">
                                <div class="p-4 border-b bg-base-50/50 flex justify-between items-center">
                                    <h2 class="font-bold flex items-center gap-2">
                                        <i data-lucide="user-minus" class="w-4 h-4 text-error"></i>
                                        Students at Risk (Failing)
                                    </h2>
                                    <span class="badge badge-sm badge-error">${failingStudents.length} Students</span>
                                </div>
                                <div class="overflow-x-auto">
                                    <table class="table table-zebra w-full">
                                        <thead>
                                            <tr class="text-xs uppercase opacity-50">
                                                <th>Student</th>
                                                <th>Last Submitted</th>
                                                <th>Status</th>
                                                <th class="text-right">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${
																							failingStudents.length
																								? failingStudents
																										.map(
																											(s) => `
                                                <tr>
                                                    <td>
                                                        <div class="font-bold">${s.name}</div>
                                                        <div class="text-xs opacity-50">${s.email}</div>
                                                    </td>
                                                    <td>Assignment ${s.assignments.lastIndexOf(true) + 1}</td>
                                                    <td><span class="badge badge-error badge-outline badge-sm">Behind by ${getStudentStatus(s).behind}</span></td>
                                                    <td class="text-right">
                                                        <button class="btn btn-ghost btn-xs text-primary" onclick="router.navigate('student-detail', '${s.id}')">Profile</button>
                                                    </td>
                                                </tr>
                                            `,
																										)
																										.join('')
																								: '<tr><td colspan="4" class="text-center py-8 opacity-50 italic">No students are currently failing.</td></tr>'
																						}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <!-- Column 3: Call Queue Sidebar -->
                        <div class="space-y-6">
                            <div class="card bg-base-100 shadow h-full">
                                <div class="card-body p-0">
                                    <div class="p-6 border-b">
                                        <h2 class="card-title text-warning flex items-center gap-2">
                                            <i data-lucide="phone" class="w-5 h-5"></i>
                                            Call Queue
                                        </h2>
                                        <p class="text-xs opacity-60 mt-1">Students who missed Assignment ${CONSTANTS.CURRENT_ASSIGNMENT}.</p>
                                    </div>
                                    <div class="p-2 max-h-[600px] overflow-y-auto custom-scrollbar">
                                        ${
																					callQueue.length
																						? callQueue
																								.map(
																									(s) => `
                                            <div class="flex items-center justify-between p-3 hover:bg-base-200 rounded-lg cursor-pointer transition-colors group" onclick="router.navigate('student-detail', '${s.id}')">
                                                <div class="flex flex-col">
                                                    <span class="text-sm font-bold">${s.name}</span>
                                                    <span class="text-xs opacity-60">${s.phone}</span>
                                                </div>
                                                <button class="btn btn-circle btn-ghost btn-xs opacity-0 group-hover:opacity-100">
                                                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                                                </button>
                                            </div>
                                        `,
																								)
																								.join('')
																						: '<div class="p-8 text-center text-sm opacity-40 italic">Queue is empty!</div>'
																				}
                                    </div>
                                    <div class="p-4 mt-auto border-t bg-base-50/50">
                                        <button class="btn btn-outline btn-block btn-sm" onclick="alert('Opening call interface...')">Process Queue</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `
			}

			function renderStudents() {
				document.getElementById('main-content').innerHTML = `
                <div class="animate-in fade-in duration-500">
                    <h1 class="text-3xl font-bold">Student Roster</h1>
                    <p class="opacity-70 mb-8">Table logic will go here.</p>
                </div>
            `
			}

			function renderBulkUpdate() {
				document.getElementById('main-content').innerHTML =
					`<h1 class="text-3xl font-bold">Bulk Update</h1>`
			}

			function renderStudentDetail(id) {
				document.getElementById('main-content').innerHTML =
					`<h1 class="text-3xl font-bold">Detail for ${id}</h1>`
			}

			// --- INITIALIZATION ---
			window.onload = () => {
				router.navigate('dashboard')
				lucide.createIcons()
			}
		</script>
	</body>
</html>
